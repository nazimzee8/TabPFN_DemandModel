name: Build and Push Docker Image to Snowflake Registry

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_REGISTRY_HOST: ${{ secrets.SNOWFLAKE_REGISTRY_HOST }}
      SNOWFLAKE_REPOSITORY: tabpfn_db/tabpfn_schema/tabpfn_repo/deepset-trainer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Snowflake Image Registry
        run: |
          docker login $SNOWFLAKE_REGISTRY_HOST \
            -u ${{ secrets.SNOWFLAKE_USER }} \
            --password-stdin <<< "${{ secrets.SNOWFLAKE_PASSWORD }}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.SNOWFLAKE_REGISTRY_HOST }}/${{ env.SNOWFLAKE_REPOSITORY }}:latest
            ${{ env.SNOWFLAKE_REGISTRY_HOST }}/${{ env.SNOWFLAKE_REPOSITORY }}:${{ github.sha }}
